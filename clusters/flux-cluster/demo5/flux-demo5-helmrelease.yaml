---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-demo5-helmrelease
  namespace: flux-system
spec:
  chart:
    spec:
      chart: demotest
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: flux-demo5-source-git
  interval: 1m0s
